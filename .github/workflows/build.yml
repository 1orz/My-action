name: Build
on:
  schedule:
    - cron: 0 4 * * *

  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      runner_image:
        description: "Runner Image"
        required: true
        type: string
        default: "ubuntu-latest"

      debug_with_ssh:
        description: "Debug with SSH"
        type: boolean
        default: false

      clean_build:
        description: "Skip use cache and clean cache"
        type: boolean
        default: false

      build_openwrt_x86_64:
        description: "Build openwrt-x86_64"
        type: boolean
        default: true

      build_openwrt_armsr_armv8:
        description: "Build openwrt-armsr-armv8"
        type: boolean
        default: true

      free_disk_space:
        description: "Free disk space on Ubuntu runners"
        type: boolean
        default: true

jobs:
  openwrt-x86_64:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.build_openwrt_x86_64 }}
    runs-on: ${{ github.event.inputs.runner_image || 'ubuntu-latest' }}
    steps:
      - uses: actions/setup-go@v6
        with:
          go-version: '^1.25.1'

      - name: Free up disk space on Ubuntu runners
        if: ${{ github.event.inputs.free_disk_space || true }}
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repo
        uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Prepare Environment and Save Build Configs
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          bash prenv.sh
          cp openwrt/x86_64 /tmp/.config

      - name: Checkout repo
        uses: actions/checkout@main
        with:
          repository: openwrt/openwrt
          fetch-depth: 0
          ref: main
      - name: Cache
        uses: stupidloud/cachewrtbuild@main
        with:
          ccache: true
          mixkey: "openwrt_x86_64"
          skip: ${{ ! github.event.inputs.clean_build || true }}
          clean: ${{ github.event.inputs.clean_build || false }}

      - name: Download and Load custom configuration
        run: |
          echo -e 'CONFIG_DEVEL=y\nCONFIG_CCACHE=y' >> .config
          rm -rf package/openwrt-passwall2 package/openwrt-passwall-packages
          git clone --depth=1 https://github.com/xiaorouji/openwrt-passwall2.git package/openwrt-passwall2
          git clone --depth=1 https://github.com/xiaorouji/openwrt-passwall-packages.git package/openwrt-passwall-packages
          rm -rf feeds/packages/net/{microsocks,sing-box,v2ray-geodata,xray-core}
          ./scripts/feeds update -a && ./scripts/feeds install -a
          cp /tmp/.config .config
          make defconfig clean
      - name: Patch Rust CI LLVM setting
        run: |
          sed -i 's/--set=llvm\.download-ci-llvm=true/--set=llvm.download-ci-llvm=false/g' feeds/packages/lang/rust/Makefile

      - name: Try to Build When Multi-core compile failure will be rollback to Single core compile
        run: |
          echo "Will be use $(nproc) thread compile"
          sudo df -h
          make -j$(nproc) || make -j1 V=99
          sudo df -h

      - name: Prepare Image Artifact
        if: success()
        run: |
          mkdir -p images
          cp -r bin/targets/*/*/*.gz images/
          cp -r bin/targets/*/*/sha256sums images/

      - name: Upload Artifact Images
        if: success()
        uses: actions/upload-artifact@main
        with:
          compression-level: 9
          include-hidden-files: true
          name: openwrt_x86_64-images
          path: images

      - name: Prepare Packages Artifact
        if: success()
        run: |
          mkdir -p pkgs
          cp -r bin/targets/*/*/packages pkgs/

      - name: Upload Artifact Packages
        if: success()
        uses: actions/upload-artifact@main
        with:
          name: openwrt_x86_64-packages
          path: pkgs

  openwrt-armsr-armv8:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.build_openwrt_armsr_armv8 }}
    runs-on: ${{ github.event.inputs.runner_image || 'ubuntu-latest' }}
    steps:
      - uses: actions/setup-go@v6
        with:
          go-version: '^1.25.1'

      - name: Free up disk space on Ubuntu runners
        if: ${{ github.event.inputs.free_disk_space || true }}
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repo
        uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Prepare Environment and Save Build Configs
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          bash prenv.sh
          cp openwrt/config-armsr-armv8 /tmp/.config

      - name: Checkout repo
        uses: actions/checkout@main
        with:
          repository: openwrt/openwrt
          fetch-depth: 0
          ref: main
      - name: Cache
        uses: stupidloud/cachewrtbuild@main
        with:
          ccache: true
          mixkey: "openwrt_armsr_armv8"
          skip: ${{ ! github.event.inputs.clean_build || true }}
          clean: ${{ github.event.inputs.clean_build || false }}

      - name: Download and Load custom configuration
        run: |
          echo -e 'CONFIG_DEVEL=y\nCONFIG_CCACHE=y' >> .config
          rm -rf package/openwrt-passwall2 package/openwrt-passwall-packages
          git clone --depth=1 https://github.com/xiaorouji/openwrt-passwall2.git package/openwrt-passwall2
          git clone --depth=1 https://github.com/xiaorouji/openwrt-passwall-packages.git package/openwrt-passwall-packages
          rm -rf feeds/packages/net/{microsocks,sing-box,v2ray-geodata,xray-core}
          ./scripts/feeds update -a && ./scripts/feeds install -a
          cp /tmp/.config .config
          make defconfig clean

      # 修复 Rust CI LLVM 下载问题
      - name: Patch Rust CI LLVM setting
        run: |
          sed -i 's/--set=llvm\.download-ci-llvm=true/--set=llvm.download-ci-llvm=false/g' feeds/packages/lang/rust/Makefile
      - name: Try to Build When Multi-core compile failure will be rollback to Single core compile
        run: |
          echo "Will be use $(nproc) thread compile"
          sudo df -h
          make -j$(nproc) || make -j1 V=99
          sudo df -h

      - name: Prepare Image Artifact
        if: success()
        run: |
          mkdir -p images
          cp -r bin/targets/*/*/*.gz images/
          cp -r bin/targets/*/*/sha256sums images/

      - name: Upload Artifact Images
        if: success()
        uses: actions/upload-artifact@main
        with:
          compression-level: 9
          include-hidden-files: true
          name: openwrt_armsr_armv8-images
          path: images

      - name: Prepare Packages Artifact
        if: success()
        run: |
          mkdir -p pkgs
          cp -r bin/targets/*/*/packages pkgs/

      - name: Upload Artifact Packages
        if: success()
        uses: actions/upload-artifact@main
        with:
          name: openwrt_armsr_armv8-packages
          path: pkgs

  release:
    needs: [openwrt-x86_64, openwrt-armsr-armv8]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download x86_64 images artifact
        uses: actions/download-artifact@v4
        with:
          name: openwrt_x86_64-images
          path: artifacts/openwrt_x86_64-images
        continue-on-error: true

      - name: Download armsr_armv8 images artifact
        uses: actions/download-artifact@v4
        with:
          name: openwrt_armsr_armv8-images
          path: artifacts/openwrt_armsr_armv8-images
        continue-on-error: true

      - name: Prepare release zip
        run: |
          set -eux
          mkdir -p release_files
          # Collect all firmware .gz files from downloaded artifacts
          find artifacts -type f -name '*.gz' -exec cp -n {} release_files/ \; || true
          ts=$(date +'%Y-%m-%d-%H_%M')
          echo "RELEASE_TS=$ts" >> "$GITHUB_ENV"
          if [ -z "$(ls -A release_files || true)" ]; then
            echo "No firmware files found to package; exiting." >&2
            exit 1
          fi
          cd release_files
          zip -r -o -q -9 "../${ts}.zip" .

      - name: Create GitHub Release and upload asset using GitHub CLI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ env.RELEASE_TS }}" \
            "${{ env.RELEASE_TS }}.zip" \
            --title "${{ env.RELEASE_TS }}" \
            --notes "OpenWrt firmware build from ${{ github.sha }}"
  cleanup-workflow-runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 3
          keep_minimum_runs: 3
          delete_workflow_pattern: build.yml